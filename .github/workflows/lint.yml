name: Lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install dependencies
        run: make deps
        env:
          TAKUMI_GUARD_AUTH_TOKEN: ${{ secrets.TAKUMI_GUARD_AUTH_TOKEN }}
      - name: Run lint
        run: make lint
