name: Lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Takumi Guard OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 #v1.1.1
        with:
          bot-id: "BT01KSPTTXMY1DBFSFFSHVGJT8KA"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install dependencies
        run: make deps
      - name: Run lint
        run: make lint
