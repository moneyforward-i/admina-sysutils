name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    outputs:
      artifact_name:
        description: "The name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Takumi Guard OIDC
      contents: read
    outputs:
      build_status: ${{ job.status }}
      artifact_name: build-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 #v1.1.1
        with:
          bot-id: "BT01KSPTTXMY1DBFSFFSHVGJT8KA"
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip nkf
      - name: Build
        run: make build-cd
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: out/bin/
          retention-days: 1
          compression-level: 0
